<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Sound waves -->
  <g fill="none" stroke="url(#wave)" stroke-width="24" stroke-linecap="round">
    <!-- Center wave -->
    <path d="M256 160 L256 352"/>
    <!-- Left waves -->
    <path d="M196 200 L196 312" opacity="0.8"/>
    <path d="M136 230 L136 282" opacity="0.6"/>
    <path d="M76 250 L76 262" opacity="0.4"/>
    <!-- Right waves -->
    <path d="M316 200 L316 312" opacity="0.8"/>
    <path d="M376 230 L376 282" opacity="0.6"/>
    <path d="M436 250 L436 262" opacity="0.4"/>
  </g>

  <!-- Car silhouette at bottom -->
  <g fill="#ffffff" opacity="0.3" transform="translate(166, 380)">
    <path d="M20 30 C20 20 30 10 50 10 L130 10 C150 10 160 20 160 30 L160 50 L20 50 Z"/>
    <circle cx="50" cy="50" r="15"/>
    <circle cx="130" cy="50" r="15"/>
  </g>
</svg>
